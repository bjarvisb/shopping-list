<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Shopping List">
  <title>Shopping List 🛒</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow-x: hidden;
    }
    #root {
      width: 100%;
      min-height: 100vh;
    }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      color: #001F3F;
    }
  </style>
</head>
<body>
  <div id="root"><div id="loading">Loading...</div></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <script type="text/babel">
    // localStorage-based storage
    window.storage = {
      get: async (key) => {
        try {
          const value = localStorage.getItem(key);
          return value ? { value } : null;
        } catch (err) {
          return null;
        }
      },
      set: async (key, value) => {
        try {
          localStorage.setItem(key, value);
          return { key, value };
        } catch (err) {
          return null;
        }
      }
    };

    const { useState, useEffect } = React;
    const { Plus, Trash2, Check, ShoppingCart, List, History, Cat, Copy, Calendar, X } = lucide;


// Aisle configurations for each store
const STORE_AISLES = {
  'Trader Joes': [
    'Produce',
    'Dairy & Eggs',
    'Frozen Foods',
    'Bakery',
    'Meat & Seafood',
    'Pantry & Dry Goods',
    'Snacks',
    'Beverages',
    'Other'
  ],
  'Aldi': [
    'Produce',
    'Dairy & Refrigerated',
    'Frozen',
    'Bakery & Bread',
    'Meat',
    'Pantry',
    'Snacks & Candy',
    'Drinks',
    'Other'
  ],
  'Food Lion': [
    'Produce',
    'Dairy',
    'Frozen',
    'Bakery',
    'Meat & Deli',
    'Canned & Dry Goods',
    'Snacks',
    'Beverages',
    'Other'
  ]
};

  // Navigation
  const [currentView, setCurrentView] = useState('lists'); // 'lists', 'inventory', 'history'
  const [activeStore, setActiveStore] = useState('Trader Joes');
  
  // Master inventory - all items ever added
  const [inventory, setInventory] = useState([]);
  
  // Active shopping lists by store (current week)
  const [activeLists, setActiveLists] = useState({
    'Trader Joes': { date: new Date().toISOString().split('T')[0], items: [] },
    'Aldi': { date: new Date().toISOString().split('T')[0], items: [] },
    'Food Lion': { date: new Date().toISOString().split('T')[0], items: [] }
  });
  
  // Completed trip history
  const [history, setHistory] = useState([]);
  
  // Weekly totals
  const [weeklyTotals, setWeeklyTotals] = useState({
    'Trader Joes': 0,
    'Aldi': 0,
    'Food Lion': 0
  });
  
  // UI state
  const [showAddForm, setShowAddForm] = useState(false);
  const [showInventoryPicker, setShowInventoryPicker] = useState(false);
  const [showNewListOptions, setShowNewListOptions] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const [newItemName, setNewItemName] = useState('');
  const [newItemAisle, setNewItemAisle] = useState('');
  const [newItemPrice, setNewItemPrice] = useState('');
  const [touchStart, setTouchStart] = useState(null);
  const [touchingItem, setTouchingItem] = useState(null);

  // Load data from storage
  useEffect(() => {
    const loadData = async () => {
      try {
        const inventoryData = await window.storage?.get('inventory');
        const activeListsData = await window.storage?.get('active-lists');
        const historyData = await window.storage?.get('history');
        const totalsData = await window.storage?.get('weekly-totals');
        
        if (inventoryData?.value) {
          setInventory(JSON.parse(inventoryData.value));
        }
        if (activeListsData?.value) {
          setActiveLists(JSON.parse(activeListsData.value));
        }
        if (historyData?.value) {
          setHistory(JSON.parse(historyData.value));
        }
        if (totalsData?.value) {
          setWeeklyTotals(JSON.parse(totalsData.value));
        }
      } catch (err) {
        console.log('No saved data found, starting fresh');
      }
    };
    loadData();
  }, []);

  // Save data to storage
  const saveData = async (newInventory, newActiveLists, newHistory, newTotals) => {
    try {
      await window.storage?.set('inventory', JSON.stringify(newInventory));
      await window.storage?.set('active-lists', JSON.stringify(newActiveLists));
      await window.storage?.set('history', JSON.stringify(newHistory));
      await window.storage?.set('weekly-totals', JSON.stringify(newTotals));
    } catch (err) {
      console.log('Could not save data');
    }
  };

  // Add item to active list (and inventory if new)
  const addItem = (fromInventory = null) => {
    let itemData;
    
    if (fromInventory) {
      // Adding from existing inventory
      itemData = {
        id: Date.now(),
        name: fromInventory.name,
        aisle: fromInventory.aisle,
        price: fromInventory.price || 0,
        purchased: false,
        inventoryId: fromInventory.id
      };
    } else {
      // Adding new item
      if (!newItemName.trim()) return;
      
      const aisle = newItemAisle || 'Other';
      const price = parseFloat(newItemPrice) || 0;
      
      // Add to inventory
      const inventoryItem = {
        id: Date.now(),
        name: newItemName.trim(),
        aisle,
        price,
        store: activeStore
      };
      
      const newInventory = [...inventory, inventoryItem];
      setInventory(newInventory);
      
      // Add to active list
      itemData = {
        id: Date.now() + 1,
        name: newItemName.trim(),
        aisle,
        price,
        purchased: false,
        inventoryId: inventoryItem.id
      };
    }
    
    const newActiveLists = {
      ...activeLists,
      [activeStore]: {
        ...activeLists[activeStore],
        items: [...activeLists[activeStore].items, itemData]
      }
    };
    
    setActiveLists(newActiveLists);
    saveData(fromInventory ? inventory : [...inventory, { id: Date.now(), name: itemData.name, aisle: itemData.aisle, price: itemData.price, store: activeStore }], newActiveLists, history, weeklyTotals);
    
    // Reset form
    setNewItemName('');
    setNewItemAisle('');
    setNewItemPrice('');
    setShowAddForm(false);
    setShowInventoryPicker(false);
    setSearchQuery('');
  };

  const addItemFromInventory = (inventoryItem) => {
    addItem(inventoryItem);
  };

  const togglePurchased = (itemId) => {
    const newActiveLists = {
      ...activeLists,
      [activeStore]: {
        ...activeLists[activeStore],
        items: activeLists[activeStore].items.map(item =>
          item.id === itemId ? { ...item, purchased: !item.purchased } : item
        )
      }
    };
    setActiveLists(newActiveLists);
    saveData(inventory, newActiveLists, history, weeklyTotals);
  };

  const deleteItem = (itemId) => {
    const newActiveLists = {
      ...activeLists,
      [activeStore]: {
        ...activeLists[activeStore],
        items: activeLists[activeStore].items.filter(item => item.id !== itemId)
      }
    };
    setActiveLists(newActiveLists);
    saveData(inventory, newActiveLists, history, weeklyTotals);
  };

  const completeTrip = () => {
    const currentList = activeLists[activeStore];
    const tripTotal = currentList.items
      .filter(item => item.purchased)
      .reduce((sum, item) => sum + item.price, 0);
    
    // Add to history
    const historyEntry = {
      id: Date.now(),
      store: activeStore,
      date: currentList.date,
      items: currentList.items.filter(item => item.purchased),
      total: tripTotal
    };
    
    const newHistory = [historyEntry, ...history];
    
    // Update weekly totals
    const newTotals = {
      ...weeklyTotals,
      [activeStore]: weeklyTotals[activeStore] + tripTotal
    };
    
    // Clear purchased items from active list
    const newActiveLists = {
      ...activeLists,
      [activeStore]: {
        ...activeLists[activeStore],
        items: activeLists[activeStore].items.filter(item => !item.purchased)
      }
    };
    
    setHistory(newHistory);
    setWeeklyTotals(newTotals);
    setActiveLists(newActiveLists);
    saveData(inventory, newActiveLists, newHistory, newTotals);
  };

  const resetWeeklyTotals = () => {
    const newTotals = {
      'Trader Joes': 0,
      'Aldi': 0,
      'Food Lion': 0
    };
    setWeeklyTotals(newTotals);
    saveData(inventory, activeLists, history, newTotals);
  };

  const copyLastWeeksList = () => {
    // Find most recent trip for this store
    const lastTrip = history.find(h => h.store === activeStore);
    if (!lastTrip) return;
    
    const newItems = lastTrip.items.map(item => ({
      id: Date.now() + Math.random(),
      name: item.name,
      aisle: item.aisle,
      price: item.price,
      purchased: false,
      inventoryId: item.inventoryId
    }));
    
    const newActiveLists = {
      ...activeLists,
      [activeStore]: {
        date: new Date().toISOString().split('T')[0],
        items: newItems
      }
    };
    
    setActiveLists(newActiveLists);
    saveData(inventory, newActiveLists, history, weeklyTotals);
    setShowNewListOptions(false);
  };

  const startFreshList = () => {
    const newActiveLists = {
      ...activeLists,
      [activeStore]: {
        date: new Date().toISOString().split('T')[0],
        items: []
      }
    };
    setActiveLists(newActiveLists);
    saveData(inventory, newActiveLists, history, weeklyTotals);
    setShowNewListOptions(false);
  };

  const deleteInventoryItem = (inventoryId) => {
    const newInventory = inventory.filter(item => item.id !== inventoryId);
    setInventory(newInventory);
    saveData(newInventory, activeLists, history, weeklyTotals);
  };

  // Touch handlers for swipe to delete
  const handleTouchStart = (e, itemId) => {
    setTouchStart(e.touches[0].clientX);
    setTouchingItem(itemId);
  };

  const handleTouchEnd = (e, itemId) => {
    if (!touchStart) return;
    
    const touchEnd = e.changedTouches[0].clientX;
    const diff = touchStart - touchEnd;
    
    // Swipe left to delete (50px threshold)
    if (diff > 50) {
      if (currentView === 'inventory') {
        deleteInventoryItem(itemId);
      } else {
        deleteItem(itemId);
      }
    }
    
    setTouchStart(null);
    setTouchingItem(null);
  };

  // Filtered inventory based on search
  const filteredInventory = inventory.filter(item =>
    item.store === activeStore &&
    (searchQuery === '' || item.name.toLowerCase().includes(searchQuery.toLowerCase()))
  );

  // Group active list items by aisle
  const currentList = activeLists[activeStore];
  const itemsByAisle = currentList.items.reduce((acc, item) => {
    if (!acc[item.aisle]) acc[item.aisle] = [];
    acc[item.aisle].push(item);
    return acc;
  }, {});

  const orderedAisles = STORE_AISLES[activeStore].filter(aisle => itemsByAisle[aisle]);

  const currentTotal = currentList.items
    .filter(item => item.purchased)
    .reduce((sum, item) => sum + item.price, 0);

  const grandTotal = Object.values(weeklyTotals).reduce((sum, val) => sum + val, 0);

  // Colors - preppy navy and kelly green
  const colors = {
    navyPrimary: '#001F3F',
    navyLight: '#003D73',
    kellyGreen: '#00A86B',
    kellyLight: '#00C878',
    cream: '#FFF8F0',
    white: '#FFFFFF',
    gray: '#F5F5F5'
  };

  return (
    <div style={{
      minHeight: '100vh',
      background: colors.cream,
      fontFamily: '"Poppins", "Helvetica Neue", sans-serif',
      paddingBottom: '100px'
    }}>
      {/* Header */}
      <div style={{
        background: `linear-gradient(135deg, ${colors.navyPrimary} 0%, ${colors.navyLight} 100%)`,
        padding: '20px',
        position: 'sticky',
        top: 0,
        zIndex: 100,
        boxShadow: '0 4px 20px rgba(0,31,63,0.3)',
        borderBottom: `4px solid ${colors.kellyGreen}`
      }}>
        <div style={{
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          gap: '12px',
          marginBottom: '16px'
        }}>
          <Cat size={28} color={colors.kellyGreen} fill="#000" />
          <h1 style={{
            margin: 0,
            fontSize: '26px',
            fontWeight: 700,
            color: colors.white,
            letterSpacing: '0.5px'
          }}>
            Shopping List
          </h1>
          <Cat size={28} color={colors.kellyGreen} fill="#000" style={{ transform: 'scaleX(-1)' }} />
        </div>

        {/* Store Tabs */}
        <div style={{
          display: 'flex',
          gap: '8px',
          justifyContent: 'center',
          flexWrap: 'wrap'
        }}>
          {Object.keys(activeLists).map(store => (
            <button
              key={store}
              onClick={() => setActiveStore(store)}
              style={{
                padding: '10px 16px',
                border: `2px solid ${activeStore === store ? colors.kellyGreen : 'transparent'}`,
                borderRadius: '25px',
                background: activeStore === store ? colors.kellyGreen : colors.navyLight,
                color: colors.white,
                fontSize: '13px',
                fontWeight: 600,
                cursor: 'pointer',
                transition: 'all 0.3s ease',
                boxShadow: activeStore === store 
                  ? `0 4px 12px rgba(0,168,107,0.4)` 
                  : 'none',
                transform: activeStore === store ? 'scale(1.05)' : 'scale(1)',
                fontFamily: 'inherit'
              }}
            >
              {store}
            </button>
          ))}
        </div>
      </div>

      {/* Main Content Area */}
      <div style={{ padding: '16px', minHeight: '60vh' }}>
        {currentView === 'lists' && (
          <div>
            {/* List Date Header */}
            <div style={{
              background: colors.white,
              borderRadius: '12px',
              padding: '16px',
              marginBottom: '16px',
              boxShadow: '0 2px 8px rgba(0,0,0,0.1)',
              display: 'flex',
              justifyContent: 'space-between',
              alignItems: 'center'
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                <Calendar size={20} color={colors.navyPrimary} />
                <span style={{ fontSize: '16px', fontWeight: 600, color: colors.navyPrimary }}>
                  {new Date(currentList.date).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}
                </span>
              </div>
              <button
                onClick={() => setShowNewListOptions(!showNewListOptions)}
                style={{
                  padding: '8px 16px',
                  background: colors.kellyGreen,
                  border: 'none',
                  borderRadius: '20px',
                  color: colors.white,
                  fontSize: '13px',
                  fontWeight: 600,
                  cursor: 'pointer',
                  fontFamily: 'inherit'
                }}
              >
                New List
              </button>
            </div>

            {/* New List Options */}
            {showNewListOptions && (
              <div style={{
                background: colors.white,
                borderRadius: '12px',
                padding: '16px',
                marginBottom: '16px',
                boxShadow: '0 2px 8px rgba(0,0,0,0.1)'
              }}>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                  <button
                    onClick={startFreshList}
                    style={{
                      padding: '12px',
                      background: colors.kellyGreen,
                      border: 'none',
                      borderRadius: '8px',
                      color: colors.white,
                      fontWeight: 600,
                      cursor: 'pointer',
                      fontFamily: 'inherit',
                      display: 'flex',
                      alignItems: 'center',
                      justifyContent: 'center',
                      gap: '8px'
                    }}
                  >
                    <Plus size={18} />
                    Start Fresh
                  </button>
                  {history.find(h => h.store === activeStore) && (
                    <button
                      onClick={copyLastWeeksList}
                      style={{
                        padding: '12px',
                        background: colors.navyPrimary,
                        border: 'none',
                        borderRadius: '8px',
                        color: colors.white,
                        fontWeight: 600,
                        cursor: 'pointer',
                        fontFamily: 'inherit',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        gap: '8px'
                      }}
                    >
                      <Copy size={18} />
                      Copy Last Trip
                    </button>
                  )}
                  <button
                    onClick={() => setShowNewListOptions(false)}
                    style={{
                      padding: '12px',
                      background: colors.gray,
                      border: 'none',
                      borderRadius: '8px',
                      color: colors.navyPrimary,
                      fontWeight: 600,
                      cursor: 'pointer',
                      fontFamily: 'inherit'
                    }}
                  >
                    Cancel
                  </button>
                </div>
              </div>
            )}

            {/* Add Item Buttons */}
            <div style={{ marginBottom: '16px', display: 'flex', gap: '8px' }}>
              <button
                onClick={() => {
                  setShowInventoryPicker(true);
                  setShowAddForm(false);
                }}
                style={{
                  flex: 1,
                  padding: '14px',
                  background: colors.kellyGreen,
                  border: 'none',
                  borderRadius: '12px',
                  color: colors.white,
                  fontSize: '15px',
                  fontWeight: 600,
                  cursor: 'pointer',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  gap: '8px',
                  boxShadow: '0 4px 12px rgba(0,168,107,0.3)',
                  fontFamily: 'inherit'
                }}
              >
                <List size={18} />
                From My Items
              </button>
              <button
                onClick={() => {
                  setShowAddForm(true);
                  setShowInventoryPicker(false);
                }}
                style={{
                  flex: 1,
                  padding: '14px',
                  background: colors.navyPrimary,
                  border: 'none',
                  borderRadius: '12px',
                  color: colors.white,
                  fontSize: '15px',
                  fontWeight: 600,
                  cursor: 'pointer',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  gap: '8px',
                  boxShadow: '0 4px 12px rgba(0,31,63,0.3)',
                  fontFamily: 'inherit'
                }}
              >
                <Plus size={18} />
                Add New
              </button>
            </div>

            {/* Inventory Picker */}
            {showInventoryPicker && (
              <div style={{
                background: colors.white,
                borderRadius: '12px',
                padding: '16px',
                marginBottom: '16px',
                boxShadow: '0 4px 16px rgba(0,0,0,0.15)',
                maxHeight: '400px',
                overflow: 'auto'
              }}>
                <div style={{
                  display: 'flex',
                  justifyContent: 'space-between',
                  alignItems: 'center',
                  marginBottom: '12px'
                }}>
                  <h3 style={{ margin: 0, fontSize: '18px', color: colors.navyPrimary }}>My Items</h3>
                  <button
                    onClick={() => setShowInventoryPicker(false)}
                    style={{
                      background: 'transparent',
                      border: 'none',
                      cursor: 'pointer',
                      padding: '4px'
                    }}
                  >
                    <X size={24} color={colors.navyPrimary} />
                  </button>
                </div>
                
                <input
                  type="text"
                  placeholder="Search items..."
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  style={{
                    width: '100%',
                    padding: '12px',
                    border: `2px solid ${colors.kellyGreen}`,
                    borderRadius: '8px',
                    fontSize: '15px',
                    marginBottom: '12px',
                    fontFamily: 'inherit',
                    boxSizing: 'border-box'
                  }}
                />

                {filteredInventory.length === 0 ? (
                  <p style={{ textAlign: 'center', color: '#999', padding: '20px' }}>
                    No items in inventory yet
                  </p>
                ) : (
                  filteredInventory.map(item => (
                    <div
                      key={item.id}
                      onClick={() => addItemFromInventory(item)}
                      style={{
                        padding: '12px',
                        borderBottom: '1px solid #eee',
                        cursor: 'pointer',
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'center',
                        transition: 'background 0.2s',
                        ':hover': { background: colors.gray }
                      }}
                      onMouseEnter={(e) => e.currentTarget.style.background = colors.gray}
                      onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
                    >
                      <div>
                        <div style={{ fontWeight: 600, color: colors.navyPrimary }}>{item.name}</div>
                        <div style={{ fontSize: '13px', color: '#666' }}>
                          {item.aisle} {item.price > 0 && `• $${item.price.toFixed(2)}`}
                        </div>
                      </div>
                      <Plus size={20} color={colors.kellyGreen} />
                    </div>
                  ))
                )}
              </div>
            )}

            {/* Add New Item Form */}
            {showAddForm && (
              <div style={{
                background: colors.white,
                borderRadius: '12px',
                padding: '16px',
                marginBottom: '16px',
                boxShadow: '0 4px 16px rgba(0,0,0,0.15)'
              }}>
                <div style={{
                  display: 'flex',
                  justifyContent: 'space-between',
                  alignItems: 'center',
                  marginBottom: '12px'
                }}>
                  <h3 style={{ margin: 0, fontSize: '18px', color: colors.navyPrimary }}>Add New Item</h3>
                  <button
                    onClick={() => setShowAddForm(false)}
                    style={{
                      background: 'transparent',
                      border: 'none',
                      cursor: 'pointer',
                      padding: '4px'
                    }}
                  >
                    <X size={24} color={colors.navyPrimary} />
                  </button>
                </div>

                <input
                  type="text"
                  placeholder="Item name"
                  value={newItemName}
                  onChange={(e) => setNewItemName(e.target.value)}
                  onKeyPress={(e) => e.key === 'Enter' && addItem()}
                  style={{
                    width: '100%',
                    padding: '12px',
                    border: `2px solid ${colors.kellyGreen}`,
                    borderRadius: '8px',
                    fontSize: '15px',
                    marginBottom: '8px',
                    fontFamily: 'inherit',
                    boxSizing: 'border-box'
                  }}
                  autoFocus
                />
                <select
                  value={newItemAisle}
                  onChange={(e) => setNewItemAisle(e.target.value)}
                  style={{
                    width: '100%',
                    padding: '12px',
                    border: `2px solid ${colors.kellyGreen}`,
                    borderRadius: '8px',
                    fontSize: '15px',
                    marginBottom: '8px',
                    fontFamily: 'inherit',
                    boxSizing: 'border-box'
                  }}
                >
                  <option value="">Select aisle...</option>
                  {STORE_AISLES[activeStore].map(aisle => (
                    <option key={aisle} value={aisle}>{aisle}</option>
                  ))}
                </select>
                <input
                  type="number"
                  placeholder="Price (optional)"
                  value={newItemPrice}
                  onChange={(e) => setNewItemPrice(e.target.value)}
                  onKeyPress={(e) => e.key === 'Enter' && addItem()}
                  step="0.01"
                  style={{
                    width: '100%',
                    padding: '12px',
                    border: `2px solid ${colors.kellyGreen}`,
                    borderRadius: '8px',
                    fontSize: '15px',
                    marginBottom: '12px',
                    fontFamily: 'inherit',
                    boxSizing: 'border-box'
                  }}
                />
                <button
                  onClick={() => addItem()}
                  style={{
                    width: '100%',
                    padding: '12px',
                    background: colors.kellyGreen,
                    border: 'none',
                    borderRadius: '8px',
                    color: colors.white,
                    fontWeight: 600,
                    cursor: 'pointer',
                    fontFamily: 'inherit'
                  }}
                >
                  Add to List
                </button>
              </div>
            )}

            {/* Shopping List by Aisle */}
            {orderedAisles.length === 0 ? (
              <div style={{
                background: colors.white,
                borderRadius: '12px',
                padding: '40px 20px',
                textAlign: 'center',
                boxShadow: '0 2px 8px rgba(0,0,0,0.1)'
              }}>
                <ShoppingCart size={48} color={colors.navyPrimary} style={{ opacity: 0.3, marginBottom: '16px' }} />
                <p style={{ fontSize: '18px', margin: 0, color: colors.navyPrimary }}>No items yet!</p>
                <p style={{ fontSize: '14px', color: '#999', margin: '8px 0 0 0' }}>
                  Add items to get started
                </p>
              </div>
            ) : (
              orderedAisles.map(aisle => (
                <div key={aisle} style={{ marginBottom: '16px' }}>
                  <div style={{
                    background: `linear-gradient(135deg, ${colors.navyPrimary} 0%, ${colors.navyLight} 100%)`,
                    padding: '12px 16px',
                    borderRadius: '10px 10px 0 0',
                    color: colors.white,
                    fontWeight: 700,
                    fontSize: '15px',
                    letterSpacing: '0.5px',
                    boxShadow: '0 2px 8px rgba(0,0,0,0.15)'
                  }}>
                    {aisle}
                  </div>
                  <div style={{
                    background: colors.white,
                    borderRadius: '0 0 10px 10px',
                    overflow: 'hidden',
                    boxShadow: '0 4px 12px rgba(0,0,0,0.1)'
                  }}>
                    {itemsByAisle[aisle].map((item, idx) => (
                      <div
                        key={item.id}
                        onTouchStart={(e) => handleTouchStart(e, item.id)}
                        onTouchEnd={(e) => handleTouchEnd(e, item.id)}
                        style={{
                          display: 'flex',
                          alignItems: 'center',
                          padding: '14px',
                          borderBottom: idx < itemsByAisle[aisle].length - 1 ? `1px solid ${colors.gray}` : 'none',
                          transition: 'all 0.2s ease',
                          background: item.purchased ? '#E8F5E9' : colors.white,
                          opacity: touchingItem === item.id ? 0.7 : 1,
                          transform: touchingItem === item.id ? 'translateX(-10px)' : 'translateX(0)'
                        }}
                      >
                        <button
                          onClick={() => togglePurchased(item.id)}
                          style={{
                            width: '28px',
                            height: '28px',
                            borderRadius: '50%',
                            border: `2px solid ${item.purchased ? colors.kellyGreen : '#ccc'}`,
                            background: item.purchased ? colors.kellyGreen : colors.white,
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            cursor: 'pointer',
                            marginRight: '12px',
                            flexShrink: 0,
                            transition: 'all 0.2s ease'
                          }}
                        >
                          {item.purchased && <Check size={18} color={colors.white} strokeWidth={3} />}
                        </button>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{
                            fontSize: '15px',
                            fontWeight: 500,
                            textDecoration: item.purchased ? 'line-through' : 'none',
                            color: item.purchased ? '#999' : colors.navyPrimary,
                            marginBottom: '2px'
                          }}>
                            {item.name}
                          </div>
                          {item.price > 0 && (
                            <div style={{
                              fontSize: '13px',
                              color: colors.kellyGreen,
                              fontWeight: 600
                            }}>
                              ${item.price.toFixed(2)}
                            </div>
                          )}
                        </div>
                        <button
                          onClick={() => deleteItem(item.id)}
                          style={{
                            background: 'transparent',
                            border: 'none',
                            cursor: 'pointer',
                            padding: '8px',
                            color: '#ff6b6b',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center'
                          }}
                        >
                          <Trash2 size={20} />
                        </button>
                      </div>
                    ))}
                  </div>
                </div>
              ))
            )}
          </div>
        )}

        {currentView === 'inventory' && (
          <div>
            <div style={{
              background: colors.white,
              borderRadius: '12px',
              padding: '16px',
              marginBottom: '16px',
              boxShadow: '0 2px 8px rgba(0,0,0,0.1)'
            }}>
              <h2 style={{ margin: '0 0 12px 0', fontSize: '20px', color: colors.navyPrimary }}>
                My Items - {activeStore}
              </h2>
              <input
                type="text"
                placeholder="Search items..."
                value={searchQuery}
                onChange={(e) => setSearchQuery(e.target.value)}
                style={{
                  width: '100%',
                  padding: '12px',
                  border: `2px solid ${colors.kellyGreen}`,
                  borderRadius: '8px',
                  fontSize: '15px',
                  fontFamily: 'inherit',
                  boxSizing: 'border-box'
                }}
              />
            </div>

            {filteredInventory.length === 0 ? (
              <div style={{
                background: colors.white,
                borderRadius: '12px',
                padding: '40px 20px',
                textAlign: 'center',
                boxShadow: '0 2px 8px rgba(0,0,0,0.1)'
              }}>
                <List size={48} color={colors.navyPrimary} style={{ opacity: 0.3, marginBottom: '16px' }} />
                <p style={{ fontSize: '18px', margin: 0, color: colors.navyPrimary }}>No saved items yet</p>
                <p style={{ fontSize: '14px', color: '#999', margin: '8px 0 0 0' }}>
                  Items you add will appear here for quick reuse
                </p>
              </div>
            ) : (
              <div style={{
                background: colors.white,
                borderRadius: '12px',
                overflow: 'hidden',
                boxShadow: '0 4px 12px rgba(0,0,0,0.1)'
              }}>
                {filteredInventory.map((item, idx) => (
                  <div
                    key={item.id}
                    onTouchStart={(e) => handleTouchStart(e, item.id)}
                    onTouchEnd={(e) => handleTouchEnd(e, item.id)}
                    style={{
                      padding: '14px',
                      borderBottom: idx < filteredInventory.length - 1 ? `1px solid ${colors.gray}` : 'none',
                      display: 'flex',
                      justifyContent: 'space-between',
                      alignItems: 'center',
                      transition: 'all 0.2s ease',
                      opacity: touchingItem === item.id ? 0.7 : 1,
                      transform: touchingItem === item.id ? 'translateX(-10px)' : 'translateX(0)'
                    }}
                  >
                    <div>
                      <div style={{ fontSize: '15px', fontWeight: 600, color: colors.navyPrimary, marginBottom: '4px' }}>
                        {item.name}
                      </div>
                      <div style={{ fontSize: '13px', color: '#666' }}>
                        {item.aisle} {item.price > 0 && `• $${item.price.toFixed(2)}`}
                      </div>
                    </div>
                    <button
                      onClick={() => deleteInventoryItem(item.id)}
                      style={{
                        background: 'transparent',
                        border: 'none',
                        cursor: 'pointer',
                        padding: '8px',
                        color: '#ff6b6b'
                      }}
                    >
                      <Trash2 size={20} />
                    </button>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {currentView === 'history' && (
          <div>
            <div style={{
              background: colors.white,
              borderRadius: '12px',
              padding: '16px',
              marginBottom: '16px',
              boxShadow: '0 2px 8px rgba(0,0,0,0.1)'
            }}>
              <h2 style={{ margin: '0 0 8px 0', fontSize: '20px', color: colors.navyPrimary }}>
                Shopping History
              </h2>
              <p style={{ margin: 0, fontSize: '14px', color: '#666' }}>
                Your completed trips
              </p>
            </div>

            {history.length === 0 ? (
              <div style={{
                background: colors.white,
                borderRadius: '12px',
                padding: '40px 20px',
                textAlign: 'center',
                boxShadow: '0 2px 8px rgba(0,0,0,0.1)'
              }}>
                <History size={48} color={colors.navyPrimary} style={{ opacity: 0.3, marginBottom: '16px' }} />
                <p style={{ fontSize: '18px', margin: 0, color: colors.navyPrimary }}>No trips yet</p>
                <p style={{ fontSize: '14px', color: '#999', margin: '8px 0 0 0' }}>
                  Completed trips will appear here
                </p>
              </div>
            ) : (
              history.map(trip => (
                <div
                  key={trip.id}
                  style={{
                    background: colors.white,
                    borderRadius: '12px',
                    padding: '16px',
                    marginBottom: '12px',
                    boxShadow: '0 2px 8px rgba(0,0,0,0.1)'
                  }}
                >
                  <div style={{
                    display: 'flex',
                    justifyContent: 'space-between',
                    alignItems: 'center',
                    marginBottom: '12px',
                    paddingBottom: '12px',
                    borderBottom: `2px solid ${colors.gray}`
                  }}>
                    <div>
                      <div style={{ fontSize: '16px', fontWeight: 700, color: colors.navyPrimary }}>
                        {trip.store}
                      </div>
                      <div style={{ fontSize: '13px', color: '#666', marginTop: '4px' }}>
                        {new Date(trip.date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' })}
                      </div>
                    </div>
                    <div style={{ fontSize: '20px', fontWeight: 700, color: colors.kellyGreen }}>
                      ${trip.total.toFixed(2)}
                    </div>
                  </div>
                  <div style={{ fontSize: '13px', color: '#666' }}>
                    {trip.items.length} items purchased
                  </div>
                </div>
              ))
            )}
          </div>
        )}
      </div>

      {/* Bottom Action Bar */}
      {currentView === 'lists' && (
        <div style={{
          position: 'fixed',
          bottom: '70px',
          left: 0,
          right: 0,
          background: colors.white,
          padding: '16px',
          boxShadow: '0 -4px 20px rgba(0,0,0,0.15)',
          borderTop: `3px solid ${colors.kellyGreen}`
        }}>
          {currentTotal > 0 && (
            <div style={{
              background: `linear-gradient(135deg, ${colors.kellyGreen}15 0%, ${colors.kellyGreen}25 100%)`,
              padding: '12px',
              borderRadius: '8px',
              marginBottom: '12px',
              display: 'flex',
              justifyContent: 'space-between',
              alignItems: 'center',
              border: `2px solid ${colors.kellyGreen}`
            }}>
              <span style={{ color: colors.navyPrimary, fontSize: '14px', fontWeight: 600 }}>
                Current Trip:
              </span>
              <span style={{ color: colors.kellyGreen, fontSize: '20px', fontWeight: 700 }}>
                ${currentTotal.toFixed(2)}
              </span>
            </div>
          )}

          {currentList.items.some(item => item.purchased) && (
            <button
              onClick={completeTrip}
              style={{
                width: '100%',
                padding: '16px',
                background: `linear-gradient(135deg, ${colors.kellyGreen} 0%, ${colors.kellyLight} 100%)`,
                border: 'none',
                borderRadius: '10px',
                color: colors.white,
                fontSize: '16px',
                fontWeight: 700,
                cursor: 'pointer',
                marginBottom: '12px',
                boxShadow: '0 4px 12px rgba(0,168,107,0.3)',
                fontFamily: 'inherit'
              }}
            >
              Complete Trip & Save
            </button>
          )}

          <div style={{
            background: colors.gray,
            padding: '12px',
            borderRadius: '8px',
            border: `2px solid ${colors.navyPrimary}`
          }}>
            <div style={{
              display: 'flex',
              justifyContent: 'space-between',
              alignItems: 'center',
              marginBottom: '8px'
            }}>
              <span style={{ fontSize: '14px', fontWeight: 600, color: colors.navyPrimary }}>Weekly Totals</span>
              <button
                onClick={resetWeeklyTotals}
                style={{
                  background: colors.navyPrimary,
                  border: 'none',
                  padding: '6px 12px',
                  borderRadius: '6px',
                  color: colors.white,
                  fontSize: '12px',
                  cursor: 'pointer',
                  fontFamily: 'inherit',
                  fontWeight: 600
                }}
              >
                Reset
              </button>
            </div>
            {Object.entries(weeklyTotals).map(([store, total]) => (
              <div
                key={store}
                style={{
                  display: 'flex',
                  justifyContent: 'space-between',
                  fontSize: '13px',
                  marginBottom: '4px',
                  color: colors.navyPrimary
                }}
              >
                <span>{store}:</span>
                <span style={{ fontWeight: 600 }}>${total.toFixed(2)}</span>
              </div>
            ))}
            <div style={{
              borderTop: `2px solid ${colors.navyPrimary}`,
              marginTop: '8px',
              paddingTop: '8px',
              display: 'flex',
              justifyContent: 'space-between',
              fontWeight: 700,
              fontSize: '15px',
              color: colors.navyPrimary
            }}>
              <span>Total:</span>
              <span style={{ color: colors.kellyGreen }}>${grandTotal.toFixed(2)}</span>
            </div>
          </div>
        </div>
      )}

      {/* Bottom Navigation */}
      <div style={{
        position: 'fixed',
        bottom: 0,
        left: 0,
        right: 0,
        background: colors.white,
        borderTop: `3px solid ${colors.navyPrimary}`,
        display: 'flex',
        justifyContent: 'space-around',
        padding: '12px 0',
        boxShadow: '0 -4px 20px rgba(0,0,0,0.15)'
      }}>
        <button
          onClick={() => setCurrentView('lists')}
          style={{
            background: 'transparent',
            border: 'none',
            cursor: 'pointer',
            display: 'flex',
            flexDirection: 'column',
            alignItems: 'center',
            gap: '4px',
            color: currentView === 'lists' ? colors.kellyGreen : colors.navyPrimary,
            fontFamily: 'inherit',
            fontSize: '12px',
            fontWeight: 600,
            padding: '8px 20px'
          }}
        >
          <ShoppingCart size={24} strokeWidth={currentView === 'lists' ? 2.5 : 2} />
          Lists
        </button>
        <button
          onClick={() => {
            setCurrentView('inventory');
            setSearchQuery('');
          }}
          style={{
            background: 'transparent',
            border: 'none',
            cursor: 'pointer',
            display: 'flex',
            flexDirection: 'column',
            alignItems: 'center',
            gap: '4px',
            color: currentView === 'inventory' ? colors.kellyGreen : colors.navyPrimary,
            fontFamily: 'inherit',
            fontSize: '12px',
            fontWeight: 600,
            padding: '8px 20px'
          }}
        >
          <List size={24} strokeWidth={currentView === 'inventory' ? 2.5 : 2} />
          My Items
        </button>
        <button
          onClick={() => setCurrentView('history')}
          style={{
            background: 'transparent',
            border: 'none',
            cursor: 'pointer',
            display: 'flex',
            flexDirection: 'column',
            alignItems: 'center',
            gap: '4px',
            color: currentView === 'history' ? colors.kellyGreen : colors.navyPrimary,
            fontFamily: 'inherit',
            fontSize: '12px',
            fontWeight: 600,
            padding: '8px 20px'
          }}
        >
          <History size={24} strokeWidth={currentView === 'history' ? 2.5 : 2} />
          History
        </button>
      </div>
    </div>
  );
}

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ShoppingApp />);
  </script>
</body>
</html>
